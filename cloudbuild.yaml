# Cloud Build pipeline for freshify-users
# Triggered by push to main (2nd-gen Cloud Build trigger).
#
# Secrets are injected at deploy time as Cloud Run env vars via
# --set-secrets, so they never appear in the image or build logs.

substitutions:
  _SERVICE: freshify-users
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/freshify-prod/freshify

steps:
  # 1. Build the image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - "${_REPO}/${_SERVICE}:${SHORT_SHA}"
      - -t
      - "${_REPO}/${_SERVICE}:latest"
      - .

  # 2. Push both tags
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args: ["push", "${_REPO}/${_SERVICE}:${SHORT_SHA}"]
    waitFor: ["build"]
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args: ["push", "${_REPO}/${_SERVICE}:latest"]
    waitFor: ["build"]

  # 3. Deploy to Cloud Run with secrets wired from Secret Manager
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image=${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60
      # DEV_OTP_PEEK=1 enables GET /v1/dev/peek-otp ONLY when Twilio is not
      # configured. Endpoint refuses to run otherwise. Remove this flag (or
      # set to 0) the moment Twilio creds are wired up.
      #
      # DEV_OTP_BYPASS=1 accepts the fixed code 424242 for ANY identifier,
      # ONLY when Twilio is not configured. Auto-disabled when any TWILIO_*
      # env var is present. For sales-demo logins shared verbally by Timothy.
      # INTERNAL_S2S_SECRET — shared across freshify-users / -companies /
      # -workspaces. Used by /v1/internal/* routes for cross-service
      # membership resolution. Rotate together across all three services
      # by adding a new version in Secret Manager. The value is bound below
      # via --set-secrets so it never appears in the build log or in repo
      # history.
      # COMMS_URL and PORTAL_PUBLIC_URL are plain env. COMMS_SHARED_SECRET
      # is pulled from Secret Manager (see --set-secrets below) and must be
      # the same value set on freshify-comms.
      - --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,DEV_OTP_PEEK=1,DEV_OTP_BYPASS=1,COMMS_URL=https://freshify-comms-sbzaekoo4q-uc.a.run.app,PORTAL_PUBLIC_URL=https://freshify-portal-shell-sbzaekoo4q-uc.a.run.app
      # Twilio secrets omitted for now — adapter falls back to console-log OTP.
      # Add back when real Twilio creds are wired up:
      #   TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_VERIFY_SERVICE_SID=TWILIO_VERIFY_SERVICE_SID:latest
      # COMMS_SHARED_SECRET is consumed by sendInviteEmail when set. Until
      # the operator creates the Secret Manager entry, invite emails skip
      # gracefully and stamp emailSendError=comms_secret_not_configured.
      # See freshify-comms/cloudbuild.yaml for the one-time setup commands.
      - --set-secrets=MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,INTERNAL_S2S_SECRET=INTERNAL_S2S_SECRET:latest
    waitFor: ["push-sha"]

images:
  - "${_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REPO}/${_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 600s

